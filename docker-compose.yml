secrets:
  session_secret:
    external: true
  settings_encryption_key:
    external: true
  email_hmac_key:
    external: true

services:
  app:
    build: .
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
    ports:
      - "127.0.0.1:8080:8080"
    env_file: .env.docker
    secrets:
      - session_secret
      - settings_encryption_key
      - email_hmac_key
    volumes:
      - firewatch_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  firewatch_data:
