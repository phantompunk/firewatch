{{define "change_password.html"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password — Firewatch</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
</head>
<body>
<main class="login-container">
  <h1>Change Password</h1>
  <p class="field-description">You must set a new password before continuing.</p>
  {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
  <form method="POST" action="/api/admin/change-password">
    <div class="field-group">
      <label for="current_password">Current Password</label>
      <input type="password" id="current_password" name="current_password" required autocomplete="current-password">
    </div>
    <div class="field-group">
      <label for="new_password">New Password</label>
      <input type="password" id="new_password" name="new_password" required autocomplete="new-password" minlength="12">
    </div>
    <div class="field-group">
      <label for="confirm_password">Confirm New Password</label>
      <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password" minlength="12">
    </div>
    <button type="submit">Set New Password</button>
  </form>
</main>
</body>
</html>
{{end}}
