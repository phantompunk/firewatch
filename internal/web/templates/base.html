<script nonce="{{.Nonce}}">
  document.querySelectorAll('.sidebar-link').forEach(function(a) {
    if (a.getAttribute('href') === location.pathname) a.classList.add('active');
  });
  (function() {
    var seg = document.getElementById('theme-seg');
    var current = localStorage.getItem('theme') || '';
    seg.querySelectorAll('.theme-seg-btn').forEach(function(btn) {
      if (btn.dataset.themeVal === current) btn.classList.add('active');
      btn.addEventListener('click', function() {
        var val = this.dataset.themeVal;
        seg.querySelectorAll('.theme-seg-btn').forEach(function(b) { b.classList.remove('active'); });
        this.classList.add('active');
        if (val) {
          document.documentElement.setAttribute('data-theme', val);
          localStorage.setItem('theme', val);
        } else {
          document.documentElement.removeAttribute('data-theme');
          localStorage.removeItem('theme');
        }
      });
    });
  })();
</script>
{{end}}
